<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Wikipedia Search</h1>
            <form id="search-form">
                <div class="search-wrapper">
                    <input type="text" id="search-input" minlength="3" placeholder="Search Wikipedia" autocomplete="off"
                        required>
                    <div id="suggestions" class="suggestions-box"></div>
                </div>
                <button type="submit">Search</button>
            </form>
        </header>

        <main>
            <section id="results-grid" class="grid-layout"></section>
            <section id="article-view" class="hidden">
                <button id="back-button">← Back to results</button>
                <div id="article-content"></div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
